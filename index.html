<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0"
		/>
		<title>SimplyMe - SuperDragon777</title>
		<link
			rel="stylesheet"
			href="style.css"
		/>
		<link
			rel="preconnect"
			href="https://fonts.googleapis.com"
		/>
		<link
			rel="preconnect"
			href="https://fonts.gstatic.com"
			crossorigin
		/>
		<link
			href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;800&display=swap"
			rel="stylesheet"
		/>
		<link
			rel="icon"
			type="image/svg+xml"
			href="./favicons/seven2.svg"
		/>
	</head>
	<body>
		<div class="bg-grid"></div>
		<canvas id="particles-canvas"></canvas>

		<div class="scanlines"></div>

		<main class="fullscreen-wrapper">
			<section class="hero">
				<div class="hero-left">
					<div class="avatar-wrap">
						<div class="avatar-ring"></div>
						<img
							class="avatar"
							src="./img/avatar.jpg"
							alt="SuperDragon777"
							draggable="false"
						/>
						<div class="status-dot"></div>
					</div>
				</div>

				<div class="hero-right">
					<div class="tag-line">
						<span class="tag">📡 listening on port 127.0.0.1</span>
					</div>
					<h1 class="name">
						<span class="prefix">./</span>
						<span class="nnick">SuperDragon</span>
						<span class="accent">777</span>
					</h1>
					<p class="role">
						<span class="cursor-blink">▍</span>
						<span id="typed-role"></span>
					</p>
					<p class="bio">
						DevOps & CLI tools enthusiast.
						<br />
						Developing useful tools for advanced users,
						<br />
						automation, and occasionally web.
					</p>
					<div class="socials">
						<a
							href="https://github.com/SuperDragon777"
							class="social-btn github"
							target="_blank"
						>
							<i class="icon icon-github"></i>
							GitHub
						</a>
						<a
							href="https://t.me/superdragon0000"
							class="social-btn telegram"
							target="_blank"
						>
							<i class="icon icon-telegram"></i>
							Telegram
						</a>
						<a
							href="https://steamcommunity.com/id/superdragon0000/"
							class="social-btn steam"
							target="_blank"
						>
							<i class="icon icon-steam"></i>
							Steam
						</a>
					</div>
				</div>
			</section>
		</main>

		<script src="script.js"></script>
	</body>
</html>
